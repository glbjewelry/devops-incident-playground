services:
    app:
        build:
            context: ./app
        image: incident-playground-app:1.0
        container_name: incident_api
        environment:
            APP_VERSION: "1.0.0"
            JOBS_FILE: "/data/jobs.json"
            WORKER_STATUS_FILE: "/data/worker-status.json"
        volumes:
            - jobs-data:/data
        expose:
            - "8000"

    worker:
        image: incident-playground-app:1.0
        container_name: incident-worker
        command: ["python", "worker.py"]
        environment:
            JOBS_FILE: "/data/jobs.json"
            WORKER_STATUS_FILE: "/data/worker-status.json"
            WORKER_INTERVAL: "5"
        volumes:
            - jobs-data:/data
        depends_on:
            - app

    nginx:
        image: nginx:latest
        container_name: incident-nginx
        ports:
            - "8098:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    prometheus:
        image: prom/prometheus:latest
        container_name: incident-prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        depends_on:
            - app

    grafana:
        image: grafana/grafana:latest
        container_name: incident-grafana
        ports:
            - "3000:3000"
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
        volumes:
            - grafana-data:/var/lib/grafana
            - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
            - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
            - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
        depends_on:
            - prometheus

volumes:
    jobs-data:
    prometheus-data:
    grafana-data:
