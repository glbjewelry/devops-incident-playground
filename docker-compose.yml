services:
    app:
        build:
            context: ./app
        image: incident-playground-app:1.0
        container_name: incident_api
        environment:
            APP_VERSION: "1.0.0"
            JOBS_FILE: "/data/jobs.json"
            WORKER_STATUS_FILE: "/data/worker-status.json"
        volumes:
            - jobs-data:/data
        expose:
            - "8000"

    worker:
        image: incident-playground-app:1.0
        container_name: incident-worker
        command: ["python", "worker.py"]
        environment:
            JOBS_FILE: "/data/jobs.json"
            WORKER_STATUS_FILE: "/data/worker-status.json"
            WORKER_INTERVAL: "5"
        volumes:
            - jobs-data:/data
        depends_on:
            - app

    nginx:
        image: nginx:latest
        container_name: incident-nginx
        ports:
            - "8098:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

volumes:
    jobs-data:
